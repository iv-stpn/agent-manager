# Shared infrastructure services for agent-manager.
# Start with: docker compose -f docker-compose.yml up -d

name: agent-manager-shared

services:
  lancedb:
    build:
      context: ./apps/orchestrator-api/src/lancedb
      dockerfile: Dockerfile
    environment:
      LANCEDB_DATA_DIR: /data/lancedb
      PORT: "3200"
    volumes:
      - ./data/lancedb:/data/lancedb
    ports:
      - "3200:3200"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3200/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - shared

  lance-data-viewer:
    image: ghcr.io/lance-format/lance-data-viewer:lancedb-0.33.0
    environment:
      DATA_PATH: /data
    volumes:
      - ./data/lancedb:/data:ro
    ports:
      - "3202:8080"
    restart: unless-stopped
    networks:
      - shared

  chromium:
    image: ghcr.io/browserless/chromium
    environment:
      # Max concurrent sessions
      MAX_CONCURRENT_SESSIONS: "5"
      # Timeout for idle sessions
      TIMEOUT: "60000"
    ports:
      - "3201:3000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/json/version" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - shared

networks:
  shared:
    driver: bridge
    name: agent-manager-shared
